name: Shop Login Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/monitor.yml"

concurrency:
  group: monitoring
  cancel-in-progress: false

jobs:
  monitor:
    name: Check Shop Logins
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all monitors
        continue-on-error: true
        env:
          VIERLANDE_EMAIL: ${{ secrets.VIERLANDE_EMAIL }}
          VIERLANDE_PASSWORD: ${{ secrets.VIERLANDE_PASSWORD }}
          FRISCHFROST_EMAIL: ${{ secrets.FRISCHFROST_EMAIL }}
          FRISCHFROST_PASSWORD: ${{ secrets.FRISCHFROST_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_all.py

      - name: Upload log files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
